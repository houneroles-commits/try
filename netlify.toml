# Netlify config for the Lima PWA (frontend).
# In Netlify: Add new site → Import from GitHub → it reads this file.
# Then set VITE_API_BASE in Site settings → Environment variables to your
# deployed backend URL, e.g. https://lima-server.onrender.com

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: send all routes to index.html so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
