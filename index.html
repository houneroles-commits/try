<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FAF3E7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C120C" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Lima — weather-smart irrigation and planting decisions for smallholder farmers."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Lima — Farm Weather & Irrigation</title>
    <style>
      /* Instant paint before JS loads — matches theme.css tokens */
      html { background: #faf3e7; }
      @media (prefers-color-scheme: dark) { html { background: #1c120c; } }
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 14px;
        font-family: system-ui, sans-serif;
      }
      #boot .dot {
        width: 44px; height: 44px; border-radius: 14px;
        background: #b3542f;
        animation: bootpulse 1.1s ease-in-out infinite;
      }
      #boot span { color: #6d5340; font-size: 14px; letter-spacing: 0.16em; }
      @media (prefers-color-scheme: dark) { #boot span { color: #c8ab92; } }
      @keyframes bootpulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.82); opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot"><div class="dot"></div><span>LIMA</span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
